services:
  - type: web
    name: gev-ehs-backend
    env: python
    pythonVersion: "3.11"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABRICKS_HOST
        value: https://adb-7405610363716743.3.azuredatabricks.net
      - key: DATABRICKS_TOKEN
        sync: false
      - key: AUTH_ENABLED
        value: "false"